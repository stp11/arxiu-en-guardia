<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arxiu En Guàrdia — Cerca i descobreix els episodis del podcast</title>
    <meta
      name="description"
      content="Arxiu no oficial del podcast En Guàrdia de 3Cat. Cerca, filtra i descobreix les batalles, les aventures i les heroïcitats de la història de Catalunya i del món."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ca_ES" />
    <meta property="og:site_name" content="Arxiu En Guàrdia" />
    <meta
      property="og:title"
      content="Arxiu En Guàrdia — Cerca i descobreix els episodis del podcast"
    />
    <meta
      property="og:description"
      content="Arxiu no oficial del podcast En Guàrdia de 3Cat. Cerca, filtra i descobreix les batalles, les aventures i les heroïcitats de la història de Catalunya i del món."
    />
    <meta property="og:url" content="https://www.arxiu-en-guardia.com/" />
    <meta property="og:image" content="https://www.arxiu-en-guardia.com/favicon-512.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preload" as="font" type="font/ttf" href="/fonts/CormorantGaramond.ttf" crossorigin />
    <link rel="preload" as="font" type="font/ttf" href="/fonts/Lora.ttf" crossorigin />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved ? saved === "dark" : prefersDark;
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
